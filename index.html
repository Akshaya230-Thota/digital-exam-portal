<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digital Exam Preparation Portal</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#ffd6e8,#ffc2dd);
}

/* NAVBAR */
nav{
    background:#ff9ecb;
    padding:15px;
    text-align:center;
}

nav button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:25px;
    background:white;
    color:#c2185b;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

nav button:hover{
    background:#ffe4f1;
}

/* ACTIVE BUTTON = BLACK */
nav button.active{
    background:black;
    color:white;
}

/* CONTENT */
.content{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.page-title{
    text-align:center;
    color:#c2185b;
}

.subtopic{
    background:#ffe4f1;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

.subtopic a{
    display:inline-block;
    margin-top:8px;
    padding:8px 15px;
    background:#ff69b4;
    color:white;
    border-radius:20px;
    text-decoration:none;
}

/* LOGIN */
.login-box{
    max-width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.login-box input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

.login-box button{
    padding:10px 20px;
    background:#ff69b4;
    color:white;
    border:none;
    border-radius:20px;
}

/* LOGOUT */
.logout-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:black;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>

<!-- WEBSITE -->
<div id="mainWebsite" style="display:none;">

<nav>
<button data-page="home" class="active">Home</button>
<button data-page="aptitude">Aptitude</button>
<button data-page="coding">Coding</button>
<button data-page="reasoning">Reasoning</button>
</nav>

<div class="content" id="contentArea"></div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script>

function login(){
    if(username.value==="admin" && password.value==="1234"){
        loginPage.style.display="none";
        mainWebsite.style.display="block";
        renderPage("home");
    }else{
        error.innerText="Invalid login";
    }
}

function logout(){
    mainWebsite.style.display="none";
    loginPage.style.display="block";
}

/* ALL PDFs ADDED */
let materials={
aptitude:[
{title:"Area of Triangle",pdf:"AREA%20OF%20TRIANGLE.pdf"},
{title:"Dice",pdf:"DICE.pdf"},
{title:"LCM & HCF",pdf:"LCM%20%26%20HCF.pdf"},
{title:"Percentages",pdf:"PERCENTSGES.pdf"},
{title:"Sum of Natural Numbers",pdf:"SUM%20OF%20NATURAL%20NUMBERS.pdf"}
],
coding:[
{title:"C Language",pdf:"c_language.pdf"},
{title:"Java",pdf:"java.pdf"},
{title:"Python",pdf:"python.pdf"},
{title:"DBMS",pdf:"dbms.pdf"},
{title:"HTML",pdf:"html.pdf"},
{title:"CSS",pdf:"css.pdf"},
{title:"JavaScript",pdf:"javascript.pdf"}
],
reasoning:[
{title:"Reasoning Complete Material",pdf:"reasoning.pdf"}
]
};

function renderPage(page){

let buttons=document.querySelectorAll("nav button");
buttons.forEach(btn=>btn.classList.remove("active"));
document.querySelector(`[data-page='${page}']`).classList.add("active");

if(page==="home"){
contentArea.innerHTML=`
<h1 class="page-title">Welcome to the digital exam preparation portal 🖤</h1>
<p style="text-align:center;">Select a subject to start learning</p>`;
return;
}

let html=`<h1 class="page-title">${page.toUpperCase()}</h1>`;

materials[page].forEach(item=>{
html+=`
<div class="subtopic">
<h3>${item.title}</h3>
<a href="${item.pdf}" target="_blank">View PDF</a>
</div>`;
});

contentArea.innerHTML=html;
}

document.querySelectorAll("nav button").forEach(btn=>{
btn.addEventListener("click",()=>{
renderPage(btn.getAttribute("data-page"));
});
});

renderPage("home");

</script>

</body>
</html>
