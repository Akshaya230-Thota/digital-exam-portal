<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Exam Preparation Portal</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right,#e3f2fd,#fce4ec);
}

nav{
    background:#1e88e5;
    padding:12px;
    display:flex;
    justify-content:center;
    gap:20px;
}

nav button{
    background:white;
    border:none;
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

nav button:hover{
    background:#ffe082;
    transform:scale(1.05);
}

nav button.active{
    background:#ffca28;
}

.content{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.page-title{
    text-align:center;
    color:#1565c0;
    margin-bottom:30px;
}

.subtopic{
    background:#f5f5f5;
    padding:18px;
    margin-bottom:20px;
    border-radius:10px;
    transition:0.3s;
}

.subtopic:hover{
    background:#e3f2fd;
    transform:translateY(-3px);
}

.subtopic h3{
    margin-top:0;
    color:#0d47a1;
}

.subtopic a{
    display:inline-block;
    margin-top:10px;
    padding:6px 14px;
    background:#1e88e5;
    color:white;
    border-radius:20px;
    text-decoration:none;
    transition:0.3s;
}

.subtopic a:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<nav>
<button class="active" data-page="home">Home</button>
<button data-page="aptitude">Aptitude</button>
<button data-page="coding">Coding</button>
<button data-page="reasoning">Reasoning</button>
</nav>

<div class="content" id="contentArea">
<h1 class="page-title">Home</h1>
<p style="text-align:center;font-size:18px;">
Welcome to the Digital Exam Preparation Portal 🚀  
Select a subject from above to start learning.
</p>
</div>

<script>
const navButtons = document.querySelectorAll('nav button');
const contentArea = document.getElementById('contentArea');

let materials = {

aptitude:[
{
title:"Area of Triangle",
notes:"Formula and solved examples.",
pdfURL:"AREA%20OF%20TRIANGLE.pdf"
},
{
title:"Dice",
notes:"Important dice problems.",
pdfURL:"DICE.pdf"
},
{
title:"LCM & HCF",
notes:"Concepts and shortcut methods.",
pdfURL:"LCM%20%26%20HCF.pdf"
},
{
title:"Percentages",
notes:"Percentage tricks.",
pdfURL:"PERCENTSGES.pdf"
},
{
title:"Sum of Natural Numbers",
notes:"Formula and applications.",
pdfURL:"SUM%20OF%20NATURAL%20NUMBERS.pdf"
}
],

coding:[
{
title:"c_language",
notes:"Basics and programs.",
pdfURL:"C_LANGUAGE.pdf"
},
{
title:"java",
notes:"OOP concepts.",
pdfURL:"JAVA.pdf"
},
{
title:"python",
notes:"Data types and OOP.",
pdfURL:"PYTHON.pdf"
},
{
title:"dbms",
notes:"SQL and normalization.",
pdfURL:"DBMS.pdf"
},
{
title:"html",
notes:"Web structure.",
pdfURL:"HTML.pdf"
},
{
title:"css",
notes:"Styling concepts.",
pdfURL:"CSS.pdf"
},
{
title:"javascript",
notes:"DOM and events.",
pdfURL:"JAVASCRIPT.pdf"
}
],

reasoning:[
{
title:"Reasoning Complete Material",
notes:"Logical reasoning concepts and practice questions.",
pdfURL:"REASONING.pdf"
}
]

};

function renderPage(page){

if(page==="home"){
contentArea.innerHTML=`
<h1 class="page-title">Home</h1>
<p style="text-align:center;font-size:18px;">
Welcome to the Digital Exam Preparation Portal 🚀  
Select a subject from above to start learning.
</p>`;
return;
}

let subs=materials[page];

let html=`<h1 class="page-title">${page.charAt(0).toUpperCase()+page.slice(1)}</h1>`;

subs.forEach(sub=>{
html+=`
<div class="subtopic">
<h3>${sub.title}</h3>
<p>${sub.notes}</p>
<a href="${sub.pdfURL}" target="_blank">View PDF</a>
</div>
`;
});

contentArea.innerHTML=html;
}

navButtons.forEach(btn=>{
btn.addEventListener("click",()=>{
navButtons.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
renderPage(btn.dataset.page);
});
});

renderPage("home");
</script>

</body>
</html>
